# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - e-agenda-web-2026

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Install Entity Framework CLI
        run: dotnet tool install --global dotnet-ef

      - name: Apply ORM migrations to Azure SQL
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          dotnet ef database update \
            --project "eAgenda.WebApp/eAgenda.WebApp.csproj" \
            --startup-project "eAgenda.WebApp/eAgenda.WebApp.csproj" \
            --context EAgendaDbContext \
            --connection "$AZURE_SQL_CONNECTION_STRING"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9604FC2C1BFE460A88098ABDA74658E0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_68E41350CA564010B4B6ADF1FFB97E1F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DAC2CA0094544734896ADB76FBE13E99 }}

      - name: Configure Azure Web App settings
        shell: pwsh
        run: |
          az webapp config appsettings set `
            --resource-group "e-agenda-web-2026" `
            --name "e-agenda-web-2026" `
            --settings `
              "ASPNETCORE_ENVIRONMENT=Production" `
              "ConnectionStrings__SqlServerEF=${{ secrets.AZURE_SQL_CONNECTION_STRING }}" `
              "Logging__NewRelic__LicenseKey=${{ secrets.NEWRELIC_LICENSE_KEY }}" `
              "AutoMapper__LicenseKey=${{ secrets.AUTOMAPPER_LICENSE_KEY }}"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "e-agenda-web-2026"
          slot-name: "Production"
          package: .
